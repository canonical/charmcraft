summary: validate the Ubuntu One SSO export login flow

prepare: |
  tests.pkgs install expect

execute: |
  # see if env vars exist without printing them
  echo "CHARMCRAFT_STORE_SSO_URL=${CHARMCRAFT_STORE_SSO_URL:-<unset>}"
  echo "STAGING_SSO_USERNAME is set: $([ -n "${STAGING_SSO_USERNAME:-}" ] && echo yes || echo no)"
  echo "STAGING_SSO_USERNAME length: ${#STAGING_SSO_USERNAME}"
  echo "STAGING_SSO_PASSWORD is set: $([ -n "${STAGING_SSO_PASSWORD:-}" ] && echo yes || echo no)"
  echo "STAGING_SSO_PASSWORD length: ${#STAGING_SSO_PASSWORD}"

  expect << 'EOF'
    spawn charmcraft login --export=/tmp/sso-creds.login
    expect "Email address: "
    send "$env(STAGING_SSO_USERNAME)\r"
    expect "Password: "
    send "$env(STAGING_SSO_PASSWORD)\r"
    expect eof
  EOF
  CHARMCRAFT_AUTH=$(cat /tmp/sso-creds.login) charmcraft whoami

restore: |
  rm -f /tmp/sso-creds.login
