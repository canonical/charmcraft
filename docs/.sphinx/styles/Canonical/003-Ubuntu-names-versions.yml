extends: existence
message: |
  Please use the Ubuntu product name correctly. E.g. Ubuntu 22.04 LTS, Ubuntu
  22.10, Ubuntu 23.04 (Lunar Lobster), Ubuntu 23.10 (Mantic), Ubuntu 24.04 LTS
  (Noble Numbat).
link: https://canonical-documentation-style-guide.readthedocs-hosted.com/
nonword: true
ignorecase: true
vocab: false
scope: 
  - sentence
  - list
  - heading
  - table.header
  - table.cell
level: error
tokens:
  # LTS releases should be followed by "LTS" suffix.
  # Use (?!\.\d| LTS) so point releases like "Ubuntu 24.04.4 LTS" are not flagged.
  - 'Ubuntu \d?[02468]\.04(?!\.\d| LTS)'
  - 'Ubuntu 6\.06(?!\.\d| LTS)'
  # Non-LTS releases should not be followed by "LTS" suffix.
  - 'Ubuntu \d?\d\.10 LTS'
  - 'Ubuntu \d?[13579]\.04 LTS'
  - 'Ubuntu 6\.06 LTS'
  # All releases should match the code name.
  - 'Ubuntu 25\.10 \((?!(Questing|Questing Quokka))[^\n\)]+\)'
  - 'Ubuntu 25\.04 \((?!(Plucky|Plucky Puffin))[^\n\)]+\)'
  - 'Ubuntu 24\.10 \((?!(Oracular|Oracular Oriole))[^\n\)]+\)'
  - 'Ubuntu 24\.04 LTS \((?!(Noble|Noble Numbat))[^\n\)]+\)'
  - 'Ubuntu 23\.10 \((?!(Mantic|Mantic Minotaur))[^\n\)]+\)'
