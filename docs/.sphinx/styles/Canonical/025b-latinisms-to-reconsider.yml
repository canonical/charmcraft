# 025 - Latinisms that we strongly advise against

extends: existence
message: Use 24-hour time instead of 'AM', or 'PM', .
link: https://canonical-documentation-style-guide.readthedocs-hosted.com/
level: suggestion
scope:
  - sentence
  - list
  - heading
  - table.header
  - table.cell
nonword: true
tokens:
  - '\b[1|2]?\d?:?\d?\d\s?(?:[AaPp]\.?[Mm]\.?)\b'
