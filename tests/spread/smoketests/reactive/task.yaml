summary: pack a simple reactive charm
# Run these early since they take a while.
priority: 100

environment:
  CHARM_SNAP_CHANNEL/stable: stable
  CHARM_SNAP_CHANNEL/two: 2.x/stable
  CHARM_SNAP_CHANNEL/resolute: latest/stable
  BASE_CHANNEL/stable,two: "22.04"
  BASE_CHANNEL/resolute: "26.04"
  CHARMCRAFT_ENABLE_EXPERIMENTAL_EXTENSIONS/resolute: "1"

prepare: |
  cd reactivecharm

  if [ "$BASE_CHANNEL" = "26.04" ]; then
    cp charmcraft-26.04.yaml charmcraft.yaml
  elif [ "$CHARM_SNAP_CHANNEL" = "2.x/stable" ]; then
    cp charmcraft-2.x.yaml charmcraft.yaml
  else
    cp charmcraft-3.x.yaml charmcraft.yaml
  fi

  git init
  git config --global --add safe.directory $PWD
  git add .
  git config user.email "you@example.com"
  git config user.name "Your Name"
  git commit -m 'initial commit'

restore: |
  pushd reactivecharm
  charmcraft clean
  popd

  rm -rf reactivecharm

execute: |
  cd reactivecharm
  charmcraft pack
  test -f reactive-test*.charm
