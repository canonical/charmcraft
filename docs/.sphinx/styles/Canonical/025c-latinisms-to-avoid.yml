# 025 - Latinisms that have no place in documentation

extends: existence
message: "Don't use academic Latin terms like 'a posteriori', 'et al', and 'stet'."
link: https://canonical-documentation-style-guide.readthedocs-hosted.com/
level: suggestion
scope:
  - sentence
  - list
  - heading
  - table.header
  - table.cell
ignorecase: true
tokens:
  - 'a\sposteriori'
  - 'ad\snauseum'
  - 'et\sal'
  - 'ibid(um)?'
  - 'sic'
  - 'stet'