summary: Pack a basic charm in various forms.

environment:
  CHARM_DIR/platforms: platforms
  CHARM_DIR/uv: uv

restore: |
  pushd "${CHARM_DIR}"
  CRAFT_VERBOSITY_LEVEL=quiet charmcraft clean
  rm -f *.charm
  popd

execute: |
  pushd "${CHARM_DIR}"
  rm -f *.charm

  charmcraft pack

  test -f *.charm
  cat expected_files.txt | while read filepath; do
    unzip -qql *.charm "${filepath}"
  done

  # Verify the venv Python can import ops, reproducing the core26 dispatch script bug
  # where craft-parts removes venv/bin/python and the fallback uses system Python.
  if grep -q "^venv/bin/python$" expected_files.txt; then
    charm_file=$(find . -maxdepth 1 -type f -name "*.charm" | head -1)
    tmpdir=$(mktemp -d)
    trap "rm -rf $tmpdir" EXIT
    unzip -q "$charm_file" -d "$tmpdir"
    "$tmpdir/venv/bin/python" -c "import ops"
  fi
