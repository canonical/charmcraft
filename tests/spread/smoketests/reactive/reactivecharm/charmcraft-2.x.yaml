type: "charm"
bases:
  - build-on:
      - name: "ubuntu"
        channel: "18.04"
    run-on:
      - name: "ubuntu"
        channel: "18.04"
parts:
  charm:
    source: .
    plugin: reactive
    reactive-charm-build-arguments:
      - -v
    build-snaps:
      - charm/2.x/stable
    build-packages: [python3-dev]
