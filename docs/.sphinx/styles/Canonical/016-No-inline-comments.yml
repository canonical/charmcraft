  - ^```[^\n\{\}]*\n([^\n`][^\n]*\n|\n)*([^\n\/][^\n\/]+ +\/\/.*\n)+([^\n`]*\n)*```$
  - '(?:\.\. (code-block|code|sourcecode):: ?[^\n]*\n(?: {2,6}:\w+:\n)*?(?:\n|  +?[^ \n#][^\n#]+\n)*?)(  +?[^ \n][^\n]*?#[^\n]*?\n)'
  - '(?:\.\. (code-block|code|sourcecode):: ?[^\n]*\n(?: {2,6}:\w+:\n)*?(?:\n|  +?[^\n\/ ][^\n\/]+\n)*?)(  +?[^ \n][^\n]* \/\/[^\n]*\n)'
