type: "charm"
base: ubuntu@26.04
platforms:
  amd64:
parts:
  charm:
    source: .
    plugin: reactive
    reactive-charm-build-arguments:
      - -v
      - --binary-wheels-from-source
      - --upgrade-buildvenv-core-deps
      - --ignore-requires-python
    build-snaps:
      - charm/latest/stable
    build-packages: [python3-dev]
