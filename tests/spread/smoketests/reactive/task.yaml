summary: pack a simple reactive charm
# Run these early since they take a while.
priority: 100

environment:
  CHARM_SNAP_CHANNEL/stable: stable
  CHARM_SNAP_CHANNEL/two: 2.x/stable
  CHARM_SNAP_CHANNEL/resolute: latest/stable
  BASE_CHANNEL/stable,two: "22.04"
  BASE_CHANNEL/resolute: "26.04"
  CHARMCRAFT_ENABLE_EXPERIMENTAL_EXTENSIONS/resolute: "1"

prepare: |
  cd reactivecharm

  if [ "$BASE_CHANNEL" = "26.04" ]; then
    cat > charmcraft.yaml <<EOF
  type: "charm"
  base: ubuntu@26.04
  platforms:
    amd64:
  parts:
    charm:
      source: .
      plugin: reactive
      reactive-charm-build-arguments:
        - -v
        - --binary-wheels-from-source
      build-snaps:
        - charm/$CHARM_SNAP_CHANNEL
      build-packages: [python3-dev]
  EOF
  else
    sed -i "s|BASE_CHANNEL|$BASE_CHANNEL|" charmcraft.yaml
    sed -i "s|CHARM_SNAP_CHANNEL|$CHARM_SNAP_CHANNEL|" charmcraft.yaml
    if [ "$CHARM_SNAP_CHANNEL" != "2.x/stable" ]; then
      sed -i "s/- --binary-wheels-from-source/- --binary-wheels-from-source\n        - --upgrade-buildvenv-core-deps\n        - --ignore-requires-python/" charmcraft.yaml
    fi
  fi

  git init
  git config --global --add safe.directory $PWD
  git add .
  git config user.email "you@example.com"
  git config user.name "Your Name"
  git commit -m 'initial commit'

restore: |
  pushd reactivecharm
  charmcraft clean
  popd

  rm -rf reactivecharm

execute: |
  cd reactivecharm
  charmcraft pack
  test -f reactive-test*.charm
