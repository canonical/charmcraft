name: QA
on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "hotfix/*"
      - "release/*"
      - "renovate/*"
  pull_request:
  merge_group:

jobs:
  filter:
    runs-on: ubuntu-slim
    outputs:
      source-files: ${{ steps.filter.outputs.source-files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Combine multiple negation checks into a union (¬A ∧ ¬B ∧ ¬C), because individual entries are checked independently (A ∨ B ∨ C).
          # If we ever need to filter only for docs, glob 'docs/**/*' and '**/*.md'
          filters: |
            source-files:
              - '!({docs/**,*.md,**/*.md,.readthedocs.yaml})'
  lint:
    uses: canonical/starflow/.github/workflows/lint-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
  test:
    uses: canonical/starflow/.github/workflows/test-python.yaml@main
    needs: filter
    with:
      source-files: ${{ needs.filter.outputs.source-files }}
      # Limiting to amd64 is a workaround for https://github.com/canonical/charmcraft/issues/2018
      # Once that's resolved we should run fast and slow tests on ARM64 Ubuntu too.
      # Disabled macos tests because of https://github.com/canonical/charmcraft/issues/2605
      fast-test-platforms: '["ubuntu-22.04", "ubuntu-24.04"]'
      fast-test-python-versions: '["3.10", "3.12"]'
      # Slow tests run on noble to avoid an issue with old skopeo versions.
      slow-test-platforms: '["ubuntu-24.04"]'
      slow-test-python-versions: '["3.10", "3.12"]'
      # Lowest tests run on noble to avoid an issue with old skopeo versions.
      lowest-python-platform: ubuntu-24.04
      lowest-python-version: "3.10"
      use-lxd: true
