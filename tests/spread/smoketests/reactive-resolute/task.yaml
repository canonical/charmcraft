summary: pack a simple reactive charm on 26.04
priority: 100

systems:
  - ubuntu-26.04-64

environment:
  CHARMCRAFT_ENABLE_EXPERIMENTAL_EXTENSIONS: "1"

prepare: |
  cd reactivecharm

  git init
  git config --global --add safe.directory $PWD
  git add .
  git config user.email "you@example.com"
  git config user.name "Your Name"
  git commit -m 'initial commit'

restore: |
  pushd reactivecharm
  charmcraft clean
  popd

  rm -rf reactivecharm

execute: |
  cd reactivecharm
  charmcraft pack
  test -f reactive-test*.charm
